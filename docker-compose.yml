# docker-compose.yml

version: "3.8"

services:

  agent-engine:
    image: python:3.11

    container_name: agent-engine

    working_dir: /app

    volumes:
      - ./:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    command: >
      sh -c "
      pip install -r requirements.txt &&
      uvicorn api.api:app --host 0.0.0.0 --port 8000
      "